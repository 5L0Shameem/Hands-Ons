<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body onload="initDB()">

    <h2>Mini Expense Tracker</h2>

    Title:
    <input type="text" id="title"><br><br>

    Amount:
    <input type="number" id="amount"><br><br>

    Date:
    <input type="date" id="date"><br><br>

    <button onclick="addExpense()">Add Expense</button>
    <button onclick="viewExpenses()">View Expenses</button>
    <button onclick="deleteExpense()">Delete Expense (By ID)</button>

    <br><br>
    Enter ID to Delete:
    <input type="number" id="deleteId">

    <h3>Expense List</h3>
    <div id="expenseList"></div>

<script>

var db;

function initDB() {
    if (window.openDatabase) {

        db = openDatabase("ExpenseDB", "1.0", "Expense Database", 2 * 1024 * 1024);

        db.transaction(function(tx) {

            tx.executeSql(
                "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)"
            );

        }, transactionError);

    } else {
        alert("Web SQL not supported.");
    }
}

function addExpense() {

    var title = document.getElementById("title").value;
    var amount = document.getElementById("amount").value;
    var date = document.getElementById("date").value;

    db.transaction(function(tx) {

        tx.executeSql(
            "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
            [title, amount, date],
            function() {
                alert("Expense Added!");
                viewExpenses();
            },
            queryError
        );

    }, transactionError);
}

function viewExpenses() {

    db.transaction(function(tx) {

        tx.executeSql(
            "SELECT * FROM expenses",
            [],
            function(tx, results) {

                var output = "";
                for (var i = 0; i < results.rows.length; i++) {
                    var row = results.rows.item(i);
                    output += "ID: " + row.id +
                              " | Title: " + row.title +
                              " | Amount: " + row.amount +
                              " | Date: " + row.date + "<br>";
                }

                document.getElementById("expenseList").innerHTML = output;

            },
            queryError
        );

    }, transactionError);
}

function deleteExpense() {

    var id = document.getElementById("deleteId").value;

    db.transaction(function(tx) {

        tx.executeSql(
            "DELETE FROM expenses WHERE id = ?",
            [id],
            function() {
                alert("Expense Deleted!");
                viewExpenses();
            },
            queryError
        );

    }, transactionError);
}

function transactionError(error) {
    alert("Transaction Error: " + error.message);
}

function queryError(tx, error) {
    alert("Query Error: " + error.message);
}

</script>

</body>
</html>
