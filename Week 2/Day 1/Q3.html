<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>
<body onload="loadHistory()">

    <h2>Location Based Weather Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <h3>Current Location</h3>
    <p id="currentLocation"></p>

    <h3>Last 5 Locations</h3>
    <ul id="locationHistory"></ul>

    <script>

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(successCallback, errorCallback, {
                    timeout: 10000
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function successCallback(position) {
            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;

            document.getElementById("currentLocation").innerHTML =
                "Latitude: " + latitude + "<br>Longitude: " + longitude;

            var locationEntry = {
                lat: latitude,
                lon: longitude,
                time: new Date().toLocaleString()
            };

            var history = JSON.parse(localStorage.getItem("locationHistory")) || [];

            history.unshift(locationEntry); // add latest on top

            if (history.length > 5) {
                history.pop(); // keep only last 5
            }

            localStorage.setItem("locationHistory", JSON.stringify(history));

            displayHistory(history);
        }

        function errorCallback(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    alert("Permission denied by user.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Location information unavailable.");
                    break;
                case error.TIMEOUT:
                    alert("Location request timed out.");
                    break;
                default:
                    alert("An unknown error occurred.");
                    break;
            }
        }

        function loadHistory() {
            var history = JSON.parse(localStorage.getItem("locationHistory")) || [];
            displayHistory(history);
        }

        function displayHistory(history) {
            var list = document.getElementById("locationHistory");
            list.innerHTML = "";

            history.forEach(function(entry) {
                var li = document.createElement("li");
                li.innerHTML = 
                    "Lat: " + entry.lat + 
                    ", Lon: " + entry.lon + 
                    " (" + entry.time + ")";
                list.appendChild(li);
            });
        }

    </script>

</body>
</html>
